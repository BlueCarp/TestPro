<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="2"/>

  <!-- Tomato body -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="#E53935"/>
  <!-- Tomato highlight -->
  <ellipse cx="220" cy="250" rx="50" ry="65" fill="rgba(255,255,255,0.12)"/>

  <!-- Tomato leaf -->
  <path d="M256 180 Q240 140 220 160 Q240 170 246 180 Z" fill="#43A047"/>
  <path d="M256 180 Q260 135 275 155 Q262 168 256 180 Z" fill="#43A047"/>
  <path d="M256 180 Q256 130 256 150 Q256 165 256 180 Z" fill="#388E3C"/>
  <!-- Leaf stem -->
  <line x1="256" y1="180" x2="256" y2="200" stroke="#388E3C" stroke-width="3" stroke-linecap="round"/>

  <!-- Clock face inside tomato -->
  <circle cx="256" cy="280" rx="60" ry="60" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="256" cy="280" rx="4" ry="4" fill="#FFFFFF"/>

  <!-- Clock hands - showing 25 minutes -->
  <!-- Hour hand (pointing at ~25min position) -->
  <line x1="256" y1="280" x2="256" y2="238" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" transform="rotate(-30, 256, 280)"/>
  <!-- Minute hand -->
  <line x1="256" y1="280" x2="278" y2="280" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" transform="rotate(90, 256, 280)"/>

  <!-- Clock tick marks -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round">
    <line x1="256" y1="224" x2="256" y2="230" transform="rotate(0, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(30, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(60, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="230" transform="rotate(90, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(120, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(150, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="230" transform="rotate(180, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(210, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(240, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="230" transform="rotate(270, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(300, 256, 280)"/>
    <line x1="256" y1="224" x2="256" y2="228" transform="rotate(330, 256, 280)"/>
  </g>
</svg>
